name: Build iOS (Development Signed IPA)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Add Development Team
        run: |
          echo "DEVELOPMENT_TEAM=62K3DY93D7" >> ios/Flutter/Release.xcconfig
          # Also add to project.pbxproj via sed for the conditional identity
          cd ios
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Automatic;\n\t\t\t\tDEVELOPMENT_TEAM = 62K3DY93D7;/g' Runner.xcodeproj/project.pbxproj
          cd ..

      - name: Build signed iOS IPA
        run: flutter build ipa --release --export-method=development
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: gigscourt-signed-ios
          path: build/ios/ipa/gigscourt.ipa
